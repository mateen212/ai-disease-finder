# Model Configuration

random_forest:
  n_estimators: 200
  max_depth: 20
  min_samples_split: 5
  min_samples_leaf: 2
  max_features: "sqrt"
  bootstrap: true
  class_weight: "balanced"
  random_state: 42
  n_jobs: -1

cnn:
  architecture: "efficientnet_b0"  # Options: resnet50, efficientnet_b0, mobilenet_v2
  pretrained: true
  num_classes: 4  # Skin diseases: melanoma, eczema, psoriasis, acne
  input_size: 224
  batch_size: 32
  learning_rate: 0.001
  epochs: 20  # Reduced for demo (use 50+ for production)
  early_stopping_patience: 5
  dropout: 0.3
  
  augmentation:
    rotation_range: 20
    width_shift_range: 0.2
    height_shift_range: 0.2
    horizontal_flip: true
    vertical_flip: false
    zoom_range: 0.15
    brightness_range: [0.8, 1.2]
  
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

fusion:
  # Weights for combining different components
  weights:
    rule_based: 0.3
    random_forest: 0.5
    cnn: 0.2  # Only applies to skin conditions
  
  # Fusion strategy: "weighted_average", "max", "stacking"
  strategy: "weighted_average"
  
  # Minimum confidence threshold
  min_confidence: 0.1

explainability:
  shap:
    max_features_display: 10
    num_samples: 100  # For SHAP value computation
  
  rule_trace:
    include_failed_rules: false
    show_confidence: true

training:
  test_size: 0.2
  validation_size: 0.1
  random_state: 42
  cross_validation_folds: 5

# Disease categories
diseases:
  clinical:
    - dengue
    - covid19
    - pneumonia
  
  skin:
    - melanoma
    - eczema
    - psoriasis
    - acne

# Feature groups
feature_groups:
  symptoms:
    - fever
    - headache
    - cough
    - rash
    - nausea
    - vomiting
    - fatigue
    - body_aches
    - myalgia
    - arthralgia
    - retro_orbital_pain
    - chest_pain
    - shortness_of_breath
    - difficulty_breathing
    - abdominal_pain
    - persistent_vomiting
    - bleeding
    - loss_of_taste
    - loss_of_smell
  
  vitals:
    - temperature
    - heart_rate
    - respiratory_rate
    - blood_pressure_systolic
    - blood_pressure_diastolic
    - oxygen_saturation
  
  labs:
    - platelet_count
    - wbc_count
    - lymphocyte_percentage
    - neutrophil_percentage
    - hemoglobin
    - hematocrit
  
  demographics:
    - age
    - gender
    - travel_history
    - contact_history
    - vaccination_status

# Kaggle datasets
kaggle_datasets:
  covid19:
    - "meirnizri/covid19-dataset"
  
  dengue:
    - "mdtuser/dengue-dataset"
  
  skin_lesions:
    - "kmader/skin-cancer-mnist-ham10000"
